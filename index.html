<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Mint Clock Widget</title>
  <style>
    :root {
      --mint-1: #e6f7f1;
      --mint-2: #cfeee4;
      --mint-3: #8fcfbd;
      --mint-4: #5ea894;
      --ivory-1: #fffdf8;
      --ivory-2: #f8f4ea;
      --text-1: #355e56;
      --text-2: #6f8b84;
      --line: rgba(94, 168, 148, 0.16);
      --shadow: 0 12px 32px rgba(73, 126, 114, 0.12);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family:
        "Pretendard",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .widget {
      width: 100%;
      max-width: 400px;
      min-height: 190px;
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      padding: 22px 22px 20px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.9), transparent 32%),
        linear-gradient(145deg, var(--ivory-1), var(--mint-1));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .widget::before {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      right: -30px;
      top: -35px;
      border-radius: 999px;
      background: rgba(143, 207, 189, 0.14);
      filter: blur(6px);
    }

    .top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--line);
      color: var(--text-2);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .date {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .time-wrap {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .time {
      font-size: clamp(44px, 11vw, 68px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.06em;
      color: var(--text-1);
    }

    .seconds {
      font-size: 18px;
      font-weight: 700;
      color: var(--mint-4);
      opacity: 0.9;
    }

    @media (max-width: 480px) {
      .widget {
        min-height: 175px;
        padding: 20px 18px 18px;
      }

      .top {
        margin-bottom: 18px;
      }

      .date {
        font-size: 15px;
      }

      .seconds {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <section class="widget">
    <div class="top">
      <div class="chip" id="timezone">Asia/Seoul</div>
      <div class="chip" id="ampm">AM</div>
    </div>

    <div class="content">
      <div class="date" id="date">2026년 3월 20일 금요일</div>
      <div class="time-wrap">
        <div class="time" id="time">09:41</div>
        <div class="seconds" id="seconds">08</div>
      </div>
    </div>
  </section>

  <script>
    const dateEl = document.getElementById("date");
    const timeEl = document.getElementById("time");
    const secondsEl = document.getElementById("seconds");
    const ampmEl = document.getElementById("ampm");
    const timezoneEl = document.getElementById("timezone");

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function updateClock() {
      const now = new Date();

      const dateFormatter = new Intl.DateTimeFormat("ko-KR", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });

      const hour = now.getHours();
      const minute = now.getMinutes();
      const second = now.getSeconds();

      dateEl.textContent = dateFormatter.format(now);
      timeEl.textContent = `${pad(hour)}:${pad(minute)}`;
      secondsEl.textContent = pad(second);
      ampmEl.textContent = hour < 12 ? "AM" : "PM";
      timezoneEl.textContent =
        Intl.DateTimeFormat().resolvedOptions().timeZone || "Local Time";
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
